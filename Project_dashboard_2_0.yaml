views:
  - title: Device
    type: sections
    cards: []
    subview: false
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Time
            heading_style: title
          - clock_size: large
            show_seconds: true
            type: clock
            grid_options:
              columns: 12
              rows: 4
          - initial_view: dayGridMonth
            type: calendar
            entities:
              - calendar.smart_home_aiot
            grid_options:
              columns: 12
              rows: 8
          - type: custom:weather-card
            entity: weather.forecast_baan
            grid_options:
              columns: 12
              rows: 4
            forecast: true
        column_span: 2
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Temperature and Humidity
          - type: gauge
            entity: sensor.temperature_and_humidity_sensor_temperature
            theme: visionos
            name: Temperature
            needle: false
            grid_options:
              columns: 12
              rows: 4
          - type: gauge
            entity: sensor.temperature_and_humidity_sensor_humidity
            name: Humidity
            grid_options:
              columns: 12
              rows: 4
        column_span: 1
      - type: grid
        cards:
          - type: heading
            heading: Light
            heading_style: title
            icon: mdi:lamp-outline
          - type: light
            entity: light.tt1
            grid_options:
              columns: 6
              rows: auto
          - type: light
            entity: light.a2
            grid_options:
              columns: 6
              rows: auto
        column_span: 1
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Air quality
          - type: gauge
            entity: sensor.pth_9cw_qc_carbon_dioxide
            severity:
              green: 100
              yellow: 1500
              red: 2000
            needle: false
            max: 2000
            min: 0
            theme: Graphite Light
            name: Indoor carbondioxide
            grid_options:
              columns: 12
              rows: 4
          - type: gauge
            entity: sensor.pth_9cw_qc_2_carbon_dioxide
            theme: Graphite
            max: 2000
            min: 0
            severity:
              green: 1000
              yellow: 1500
              red: 2000
            name: Outdoor carbondioxide
            grid_options:
              columns: 12
              rows: 4
        column_span: 2
      - type: grid
        cards:
          - type: heading
            heading: Hall switch
            heading_style: title
          - show_name: true
            show_icon: true
            type: button
            entity: switch.sonoff_100129d3ae_1
            show_state: false
            name: I
