esphome:
  name: illuminance-sensor
  friendly_name: Illuminance sensor

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "qlk8c3PoiBIwdJglMN0yy5g1bJV6bCZ6ndfM8Z0CitU="

ota:
  - platform: esphome
    password: "2d35c6c00b6475624933aa9505e29b88"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Illuminance-Sensor"
    password: "TMOLeb6K9AmI"

# I²C Configuration
i2c:
  sda: 9
  scl: 10
  scan: true  # Auto-detects the sensor

# BH1750 Light Sensor
sensor:
  - platform: bh1750
    name: "Ambient Light Sensor"
    address: 0x23
    update_interval: 5s
    accuracy_decimals: 2
    
captive_portal:
    